# Supabase Configuration
# This file is used by the Supabase CLI to manage your local development environment

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = 52428800

[auth]
enabled = true
email.enable_signup = true
email.double_confirm_changes = true
email.enable_confirmations = true

[vector]
enabled = false
